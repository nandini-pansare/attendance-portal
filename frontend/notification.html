<!DOCTYPE html>
<html>
    <head>
        <title> Image Notification </title>
    </head>

    <body>

        <h1>Image Html</h1>

        <img id="notif-img" src="henry-officeAI.png" alt="image" width="300">
        <script>
            const img = new URLSearchParams(location.search).get('img');
            if(img) document.getElementById('notif-img').src = img;
        </script>
        <p>
            Your Image notification was opened.
        </p>
    </body>
</html>
